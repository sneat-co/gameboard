name: CI

on:
  push:
    branches: [main, integration/gameboard-mvp]
  pull_request:

jobs:
  backend:
    name: backend build + test (≥85% coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
      - name: Build
        working-directory: backend
        run: go build ./...
      - name: Vet
        working-directory: backend
        run: go vet ./...
      - name: Test (full suite incl. HTTP journey)
        working-directory: backend
        run: go test ./...
      - name: Coverage floor (≥85% of the library; cmd/ is thin wiring)
        working-directory: backend
        run: |
          go test ./gameboard/... -covermode=set -coverprofile=cover.out
          pct=$(go tool cover -func=cover.out | grep '^total:' | grep -oE '[0-9.]+%' | tr -d '%')
          echo "library coverage: ${pct}%"
          awk -v p="$pct" 'BEGIN{ if (p+0 < 85.0) { print "coverage below 85% floor"; exit 1 } }'

  frontend:
    name: frontend build + unit + umbrella browser E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install pnpm
        run: npm i -g pnpm
      - name: Install deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Build app
        working-directory: frontend
        run: pnpm exec nx build gameboard-app
      - name: Unit tests
        working-directory: frontend
        run: pnpm exec nx test gameboard-app
      - name: Install Playwright browser
        working-directory: frontend
        run: pnpm exec playwright install --with-deps
      - name: 'Install Caddy (E2E web server: /app prefix + SPA history fallback)'
        run: |
          curl -fsSL https://github.com/caddyserver/caddy/releases/download/v2.8.4/caddy_2.8.4_linux_amd64.tar.gz -o /tmp/caddy.tgz
          sudo tar -xzf /tmp/caddy.tgz -C /usr/local/bin caddy
          caddy version
      - name: Umbrella full-game E2E (UI → API → backend → fold)
        working-directory: frontend
        run: pnpm exec nx e2e gameboard-app-e2e
