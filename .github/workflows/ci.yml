name: CI

on:
  push:
    branches: [main, integration/gameboard-mvp]
  pull_request:

jobs:
  backend:
    name: backend build + test (≥85% coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
      - name: Build
        working-directory: backend
        run: go build ./...
      - name: Vet
        working-directory: backend
        run: go vet ./...
      - name: Test (full suite incl. HTTP journey)
        working-directory: backend
        run: go test ./...
      - name: Coverage floor (≥85% of the library; cmd/ is thin wiring)
        working-directory: backend
        run: |
          go test ./gameboard/... -covermode=set -coverprofile=cover.out
          pct=$(go tool cover -func=cover.out | grep '^total:' | grep -oE '[0-9.]+%' | tr -d '%')
          echo "library coverage: ${pct}%"
          awk -v p="$pct" 'BEGIN{ if (p+0 < 85.0) { print "coverage below 85% floor"; exit 1 } }'

  frontend:
    name: frontend build + unit + umbrella browser E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install pnpm
        run: npm i -g pnpm
      - name: Install deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Build app
        working-directory: frontend
        run: pnpm exec nx build gameboard-app
      - name: Unit tests
        working-directory: frontend
        run: pnpm exec nx test gameboard-app
      - name: Install Playwright browser
        working-directory: frontend
        run: pnpm exec playwright install --with-deps
      # The Firestore emulator is a Java app; firebase-tools runs it.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Install Firebase CLI
        run: npm i -g firebase-tools
      # Real full-stack E2E: `firebase emulators:exec` boots the Firestore
      # emulator (per firebase.json at the repo root) and injects
      # FIRESTORE_EMULATOR_HOST; the Playwright webServer then starts the real
      # backend `gameboardd` (backend/cmd/gameboardd) — which reads that env to
      # use the Firestore-emulator dalgo DB and serves the built SPA same-origin
      # via GAMEBOARD_STATIC_DIR. So the chain under test is the real
      #   UI → api4gameboard → gameboardd → dalgo → Firestore emulator → fold.
      # NOTE: depends on the frontend rebuild's Slice-0 harness (firebase.json +
      # gameboardd's Firestore-store selection + the emulator-backed Playwright
      # webServer). This job stays red until that harness lands.
      - name: Umbrella full-game E2E (UI → API → gameboardd → Firestore emulator → fold)
        run: firebase emulators:exec --only firestore --project demo-gameboard 'cd frontend && pnpm exec nx e2e gameboard-app-e2e'
